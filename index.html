<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dummy search</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/Gemini_Generated_Image_8wlj9a8wlj9a8wlj.png">
</head>

<body>
    <header class="hero_container">
        <img src="./assets/logo.png" class="logo_image" alt="The logo of Aalo search engine mocekry app">
    </header>

    <main class="main_container">
        <form class="search_form" action="https://www.google.com/search" method="get">
            <div class="search_input_wrap">
                <button type="submit" class="search_icon_button" aria-label="Search">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <input type="search" name="q" placeholder="Search what you fancy." class="search_box" aria-label="Search input">
            </div>
            <div class="explore_section">
                <button class="search_button" type="submit">Search</button>
                <button class="feel_lucky_button" type="submit" name="btnI" value="I">I feel lucky</button>
            </div>
        </form>
    </main>

    <aside class="aside_container">
        <a href="https://www.accuweather.com/" target="_blank" rel="noopener noreferrer" class="aside_link_weather">*Weather*</a>
        <a href="https://www.google.com/" target="_blank" rel="noopener noreferrer" class="aside_link_google">*Google*</a>
    </aside>

    <footer class="footer_container ">
        <a href="#" class="footer_policy">Policy</a>
        <a href="#" class="footer_t&c">Terms &  Conditions</a>
        <p class="copyright_text">Aalo search all right reserved @2026</p>
    </footer>
</body>

</html>
